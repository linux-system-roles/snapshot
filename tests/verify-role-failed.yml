---
- name: Verify role raises correct error
  block:

    - name: Show __snapshot_failed_params
      debug:
        var: __snapshot_failed_params
        verbosity: 1
    - name: Verify role raises correct error
      include_role:
        name: linux-system-roles.snapshot
      vars:
        snapshot_lvm_percent_space_required: "{{
          __snapshot_failed_params.get('snapshot_lvm_percent_space_required')
          }}"
        snapshot_all: "{{
          __snapshot_failed_params.get('snapshot_all')
          }}"
        snapshot_lvm_suffix: "{{
          __snapshot_failed_params.get('snapshot_lvm_suffix')
          }}"
        snapshot_lvm_prefix: "{{
          __snapshot_failed_params.get('snapshot_lvm_prefix')
          }}"
        snapshot_lvm_action: "{{
          __snapshot_failed_params.get('snapshot_lvm_action')
          }}"
    - name: Unreachable task
      fail:
        msg: UNREACH

  rescue:
    - name: Show snapshot_cmd
      debug:
        var: snapshot_cmd
        verbosity: 1
    - name: Check that we failed in the role
      assert:
        that: ansible_failed_result.msg != 'UNREACH'
        msg: Role has not failed when it should have

    - name: Verify output and return code are correct
      assert:
        that:
          - snapshot_cmd.failed
          - snapshot_cmd.rc != 0
        # - snapshot_cmd.msg is search(__snapshot_failed_regex)
        msg: "{{ __snapshot_failed_msg }}"
      when:
        - __snapshot_failed_regex is defined
        - __snapshot_failed_msg is defined

    - name: Verify correct exception or error message
      debug:
        var: exception, msg_stdout, msg_stderr, stdout, stderr
        verbosity: 1
      when: __snapshot_failed_exception is defined
#   assert:
#     that: exception is search(__snapshot_failed_exception) or
#       msg_stdout is search(__snapshot_failed_exception) or
#       msg_stderr is search(__snapshot_failed_exception) or
#       stdout is search(__snapshot_failed_exception) or
#       stderr is search(__snapshot_failed_exception)
#   when: __snapshot_failed_exception is defined
#   vars:
#     exception: "{{ ansible_failed_result.msg.exception | d('') }}"
#     msg_stdout: "{{ ansible_failed_result.msg.module_stdout | d('') }}"
#     msg_stderr: "{{ ansible_failed_result.msg.module_stderr | d('') }}"
#     stdout: "{{ ansible_failed_result.module_stdout | d('') }}"
#     stderr: "{{ ansible_failed_result.module_stderr | d('') }}"
